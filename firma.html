<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firma de la Casa | AvoHouse Pub</title>

<style>
:root{ --accent:#d4a017; }

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Helvetica Neue', Arial, sans-serif;
color:white;
background:url('Fondo.png') center/cover fixed no-repeat;
}

body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

.header{
position:fixed;
top:0;left:0;width:100%;
z-index:1000;
text-align:center;
padding:25px 20px 15px;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(8px);
border-bottom:1px solid rgba(255,255,255,0.08);
transition:.3s;
}

.header.shrink{padding:10px 20px 5px;}

.logo{width:240px;transition:.3s;}
.header.shrink .logo{width:160px;}

.title{margin-bottom:10px;}

.menu-nav{
display:flex;
justify-content:center;
gap:12px;
overflow-x:auto;
padding:10px 0;
}

.menu-nav a{
text-decoration:none;
color:white;
padding:10px 18px;
border:1px solid rgba(255,255,255,0.25);
border-radius:30px;
font-size:0.85em;
}

.menu-nav a.active{
background:var(--accent);
color:#111;
border-color:var(--accent);
}

.section-indicator{
position:fixed;
top:170px;
width:100%;
text-align:center;
font-size:2em;
color:var(--accent);
transition:.3s;
}

.section-indicator.shrink{
top:85px;
font-size:1.1em;
}

.container{
max-width:800px;
margin:320px auto 80px;
padding:0 20px;
}

.menu-item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<div class="header">
<img src="LogoPrincipal.png" class="logo">
<div class="title">AvoHouse Pub</div>

<div class="menu-nav">
<a href="index.html">Inicio</a>
<a href="mezcladitas.html">Mezcladitas</a>
<a href="firma.html" class="active">Firma de la Casa</a>
<a href="cervezas.html">Cervezas</a>
<a href="sinalcohol.html">Sin Alcohol</a>
</div>
</div>

<div class="section-indicator">Firma de la Casa</div>

<div class="container">
<div class="menu-item"><span>Corona Día</span><span>$18.000</span></div>
<div class="menu-item"><span>Corona Tarde</span><span>$18.000</span></div>
<div class="menu-item"><span>Corona Noche</span><span>$18.000</span></div>
<div class="menu-item"><span>Entropía</span><span>$18.000</span></div>
<div class="menu-item"><span>Explosión Solar</span><span>$18.000</span></div>
<div class="menu-item"><span>Fusión Naranja</span><span>$18.000</span></div>
<div class="menu-item"><span>Gravedad Rosa</span><span>$18.000</span></div>
<div class="menu-item"><span>El Profe</span><span>$18.000</span></div>
</div>

<script>
window.addEventListener("scroll", function(){
const header=document.querySelector(".header");
const indicator=document.querySelector(".section-indicator");
if(window.scrollY>80){
header.classList.add("shrink");
indicator.classList.add("shrink");
}else{
header.classList.remove("shrink");
indicator.classList.remove("shrink");
}
});
</script>

</body>
</html>
