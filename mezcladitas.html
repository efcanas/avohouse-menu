<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezcladitas | AvoHouse Pub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Helvetica Neue', Arial, sans-serif;
color:white;
background:url('Fondo.png') center/cover fixed no-repeat;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

/* HEADER */

.header{
text-align:center;
padding:40px 20px 10px 20px;
}

.logo{
width:260px;
max-width:90%;
margin-bottom:10px;
}

.title{
font-size:1.6em;
letter-spacing:3px;
margin-bottom:20px;
}

/* NAV SUPERIOR */

.menu-nav{
display:flex;
overflow-x:auto;
gap:12px;
padding:10px 20px 20px 20px;
justify-content:center;
}

.menu-nav::-webkit-scrollbar{
display:none;
}

.menu-nav a{
flex:0 0 auto;
text-decoration:none;
color:white;
padding:10px 18px;
border:1px solid rgba(255,255,255,0.25);
border-radius:30px;
font-size:0.85em;
white-space:nowrap;
transition:0.3s;
}

.menu-nav a:hover{
background:white;
color:#111;
}

/* PRODUCTOS */

.container{
max-width:1000px;
margin:30px auto 60px auto;
padding:0 20px;
}

.product-grid{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
gap:30px;
}

.product-card{
text-align:center;
}

.product-card img{
width:100%;
border-radius:10px;
margin-bottom:12px;
transition:0.3s;
}

.product-card img:hover{
transform:scale(1.05);
}

.product-name{
font-size:1em;
margin-bottom:5px;
}

.price{
color:#ccc;
font-size:0.9em;
}

.back{
display:block;
text-align:center;
margin-top:40px;
color:#ccc;
text-decoration:none;
font-size:0.9em;
}

.back:hover{
color:white;
}

@media (max-width:480px){
.logo{
width:220px;
}
.title{
font-size:1.3em;
}
}

</style>
</head>

<body>

<div class="header">

<img src="LogoPrincipal.png" class="logo">

<div class="title">Mezcladitas</div>

<div class="menu-nav">
<a href="index.html">Inicio</a>
<a href="firma.html">Firma de la Casa</a>
<a href="cervezas.html">Cervezas</a>
<a href="sinalcohol.html">Sin Alcohol</a>
</div>

</div>

<div class="container">

<div class="product-grid">

<!-- AQUÍ VAN TUS MEZCLADITAS -->

<div class="product-card">
<img src="producto.png">
<div class="product-name">Nombre Mezcladita 1</div>
<div class="price">$XX.XXX</div>
</div>

<div class="product-card">
<img src="producto.png">
<div class="product-name">Nombre Mezcladita 2</div>
<div class="price">$XX.XXX</div>
</div>

<div class="product-card">
<img src="producto.png">
<div class="product-name">Nombre Mezcladita 3</div>
<div class="price">$XX.XXX</div>
</div>

</div>

<a href="index.html" class="back">← Volver al inicio</a>

</div>

</body>
</html>
