<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezcladitas | AvoHouse Pub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Helvetica Neue', Arial, sans-serif;
color:white;
background:url('Fondo.png') center/cover fixed no-repeat;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

/* ===== HEADER FIJO ===== */

.top-nav{
position:fixed;
top:0;
left:0;
width:100%;
background:rgba(0,0,0,0.9);
padding:15px 0;
text-align:center;
z-index:1000;
}

.top-nav a{
text-decoration:none;
color:white;
border:1px solid rgba(255,255,255,0.3);
padding:10px 20px;
border-radius:30px;
font-size:0.85em;
letter-spacing:2px;
transition:0.3s;
}

.top-nav a:hover{
background:white;
color:black;
}

/* ===== CONTENIDO ===== */

.container{
max-width:900px;
margin:120px auto 80px auto;
padding:20px;
}

.category-title{
font-size:1.8em;
letter-spacing:4px;
margin-bottom:40px;
text-align:center;
}

.subcategory{
margin-top:40px;
font-size:1.2em;
letter-spacing:3px;
border-bottom:1px solid rgba(255,255,255,0.2);
padding-bottom:10px;
margin-bottom:25px;
}

.product{
margin-bottom:40px;
}

.product img{
width:100%;
max-width:400px;
border-radius:10px;
margin-bottom:15px;
cursor:pointer;
transition:0.3s;
}

.product img:hover{
transform:scale(1.05);
}

.product h3{
font-size:1.1em;
margin-bottom:5px;
}

.price{
float:right;
font-weight:bold;
}

.ingredients{
font-size:0.9em;
color:#ccc;
line-height:1.5;
}

@media(max-width:480px){
.product img{
max-width:100%;
}
}

</style>
</head>

<body>

<!-- BOTÓN FIJO DE CATEGORÍA -->

<div class="top-nav">
<a href="index.html">← Volver al Menú</a>
</div>

<div class="container">

<div class="category-title">MEZCLADITAS</div>

<!-- DORADA -->

<div class="subcategory">DORADA</div>

<div class="product">
<img src="producto.png">
<h3>Mezcladita Dorada <span class="price">$18.000</span></h3>
<div class="ingredients">
Cerveza dorada, limón, sal especial y mezcla de la casa.
</div>
</div>

<!-- ROJA -->

<div class="subcategory">ROJA</div>

<div class="product">
<img src="producto.png">
<h3>Mezcladita Roja <span class="price">$18.000</span></h3>
<div class="ingredients">
Cerveza roja, frutos rojos, limón y toque dulce artesanal.
</div>
</div>

<!-- TRIGO -->

<div class="subcategory">TRIGO</div>

<div class="product">
<img src="producto.png">
<h3>Mezcladita Trigo <span class="price">$18.000</span></h3>
<div class="ingredients">
Cerveza de trigo, cítricos frescos y especias suaves.
</div>
</div>

</div>

</body>
</html>
