<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sin Alcohol | AvoHouse Pub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Helvetica Neue', Arial, sans-serif;
color:white;
background:url('Fondo.png') center/cover fixed no-repeat;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
text-align:center;
padding:25px 20px 15px 20px;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(8px);
border-bottom:1px solid rgba(255,255,255,0.08);
transition:all 0.3s ease;
}

.header.shrink{
padding:10px 20px 5px 20px;
}

.logo{
width:280px;
max-width:90%;
margin-bottom:8px;
transition:all 0.3s ease;
}

.header.shrink .logo{
width:170px;
}

.title{
font-size:1.5em;
letter-spacing:3px;
margin-bottom:15px;
color:#7fffd4; /* aqua suave */
transition:all 0.3s ease;
}

.header.shrink .title{
font-size:1.1em;
margin-bottom:8px;
}

/* NAV */

.menu-nav{
display:flex;
overflow-x:auto;
gap:12px;
padding:10px 20px 20px 20px;
justify-content:center;
}

.menu-nav::-webkit-scrollbar{
display:none;
}

.menu-nav a{
flex:0 0 auto;
text-decoration:none;
color:white;
padding:10px 18px;
border:1px solid rgba(255,255,255,0.25);
border-radius:30px;
font-size:0.85em;
white-space:nowrap;
transition:0.3s;
}

.menu-nav a:hover{
background:white;
color:#111;
}

/* ESPACIADOR */

.spacer{
height:180px;
}

/* CONTENIDO */

.container{
max-width:1000px;
margin:0 auto 80px auto;
padding:0 20px;
}

.product-grid{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
gap:35px;
}

.product-card{
text-align:center;
}

.product-card img{
width:100%;
border-radius:12px;
margin-bottom:15px;
transition:transform 0.3s ease, box-shadow 0.3s ease;
}

/* Zoom */

.product-card img:hover{
transform:scale(1.12);
}

/* Neon aqua */

.neon-sin{
box-shadow:0 0 10px #7fffd4, 0 0 22px #7fffd4;
}

.product-name{
font-size:1.05em;
margin-bottom:6px;
letter-spacing:1px;
}

.price{
font-size:0.95em;
color:#e0e0e0;
}

.back{
display:block;
text-align:center;
margin-top:60px;
color:#ccc;
text-decoration:none;
font-size:0.9em;
}

.back:hover{
color:white;
}

</style>
</head>

<body>

<div class="header">
<img src="LogoPrincipal.png" class="logo">
<div class="title">Sin Alcohol</div>

<div class="menu-nav">
<a href="index.html">Inicio</a>
<a href="mezcladitas.html">Mezcladitas</a>
<a href="firma.html">Firma de la Casa</a>
<a href="cervezas.html">Cervezas</a>
</div>
</div>

<div class="spacer"></div>

<div class="container">

<div class="product-grid">

<div class="product-card">
<img src="producto.png" class="neon-sin">
<div class="product-name">Agua</div>
<div class="price">$4.000</div>
</div>

<div class="product-card">
<img src="producto.png" class="neon-sin">
<div class="product-name">Coca-Cola</div>
<div class="price">$4.500</div>
</div>

<div class="product-card">
<img src="producto.png" class="neon-sin">
<div class="product-name">Electrolit</div>
<div class="price">$12.000</div>
</div>

<div class="product-card">
<img src="producto.png" class="neon-sin">
<div class="product-name">Ginger Ale</div>
<div class="price">$4.000</div>
</div>

<div class="product-card">
<img src="producto.png" class="neon-sin">
<div class="product-name">Soda Especial</div>
<div class="price">$10.000</div>
</div>

<div class="product-card">
<img src="producto.png" class="neon-sin">
<div class="product-name">Soda</div>
<div class="price">$4.000</div>
</div>

</div>

<a href="index.html" class="back">← Volver al inicio</a>

</div>

<script>
const header = document.querySelector(".header");
const spacer = document.querySelector(".spacer");

function adjustSpacer(){
spacer.style.height = header.offsetHeight + "px";
}

window.addEventListener("load", adjustSpacer);
window.addEventListener("resize", adjustSpacer);

window.addEventListener("scroll", function(){
if(window.scrollY > 80){
header.classList.add("shrink");
} else {
header.classList.remove("shrink");
}
});
</script>

</body>
</html>
