<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AvoHouse - Menú</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(to bottom, #0f0f0f, #1a1a1a);
    color: #e6e1d9;
    scroll-behavior: smooth;
}

nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(15,15,15,0.95);
    padding: 15px;
    text-align: center;
    z-index: 1000;
    border-bottom: 1px solid #222;
}

nav a {
    color: #8b6f47;
    text-decoration: none;
    margin: 0 15px;
    font-size: 0.9em;
    letter-spacing: 1px;
}

header {
    padding: 120px 20px 60px;
    text-align: center;
}

h1 {
    font-size: 2.8em;
    letter-spacing: 3px;
    color: #8b6f47;
}

.tagline {
    font-size: 0.9em;
    color: #aaa;
    margin-top: 10px;
}

.section {
    padding: 60px 20px;
    text-align: center;
    animation: fadeIn 1.5s ease;
}

h2 {
    color: #6b8e23;
    font-weight: normal;
    border-bottom: 1px solid #333;
    display: inline-block;
    padding-bottom: 5px;
    margin-bottom: 40px;
}

.item {
    margin: 25px 0;
    font-size: 1.1em;
}

.price {
    color: #8b6f47;
    font-size: 0.9em;
    margin-top: 5px;
}

footer {
    padding: 40px 20px;
    text-align: center;
    font-size: 0.8em;
    color: #777;
    border-top: 1px solid #222;
}

/* Animación */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Botón WhatsApp */
.whatsapp-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #25D366;
    color: white;
    padding: 15px 18px;
    border-radius: 50px;
    text-decoration: none;
    font-size: 0.9em;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    z-index: 1000;
}

.whatsapp-btn:hover {
    background-color: #1ebe5d;
}
</style>
</head>

<body>

<nav>
    <a href="#mezcladitas">Mezcladitas</a>
    <a href="#cervezas">Cervezas</a>
    <a href="#contacto">Contacto</a>
</nav>

<header>
    <h1>AvoHouse</h1>
    <div class="tagline">Donde la música no compite con la conversación.</div>
</header>

<div id="mezcladitas" class="section">
    <h2>Mezcladitas</h2>

    <div class="item">
        Mezcla Tropical
        <div class="price">$25.000</div>
    </div>

    <div class="item">
        Mezcla Cítrica
        <div class="price">$27.000</div>
    </div>

</div>

<div id="cervezas" class="section">
    <h2>Cervezas</h2>

    <div class="item">
        Cerveza Nacional
        <div class="price">$6.000</div>
    </div>

</div>

<footer id="contacto">
    Abierto Dom-Jue 16:00 - 00:00 <br>
    Viernes y Sábado hasta 01:00 <br><br>
    Calle 27 No. 26-99
    San José del Guaviare
</footer>

<a class="whatsapp-btn" href="https://wa.me/573XXXXXXXXX" target="_blank">
    Hablemos
</a>

</body>
</html>
