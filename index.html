<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AvoHouse - Menú</title>
<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background-color: #0f0f0f;
    color: #e6e1d9;
    text-align: center;
}

header {
    padding: 40px 20px;
}

h1 {
    font-size: 2.5em;
    letter-spacing: 2px;
    color: #8b6f47;
}

.section {
    padding: 30px 20px;
}

h2 {
    color: #6b8e23;
    font-weight: normal;
    border-bottom: 1px solid #333;
    display: inline-block;
    padding-bottom: 5px;
}

.item {
    margin: 20px 0;
}

.price {
    color: #8b6f47;
    font-size: 0.9em;
}
footer {
    margin-top: 40px;
    padding: 20px;
    font-size: 0.8em;
    color: #777;
}
</style>
</head>

<body>

<header>
    <h1>AvoHouse</h1>
    <p>Donde la música no compite con la conversación.</p>
</header>

<div class="section">
    <h2>Mezcladitas</h2>

    <div class="item">
        <p>Mezcla Tropical</p>
        <p class="price">$25.000</p>
    </div>

    <div class="item">
        <p>Mezcla Cítrica</p>
        <p class="price">$27.000</p>
    </div>
</div>

<div class="section">
    <h2>Cervezas</h2>

    <div class="item">
        <p>Cerveza Nacional</p>
        <p class="price">$6.000</p>
    </div>
</div>

<footer>
    Abierto 16:00 - 00:00 | Viernes y Sábado hasta 01:00
</footer>

</body>
</html>
