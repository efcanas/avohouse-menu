<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AvoHouse Pub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Helvetica Neue', Arial, sans-serif;
color:white;
background:url('Fondo.png') center/cover fixed no-repeat;
}

/* Capa oscura elegante */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

/* CONTENIDO PRINCIPAL */

.main{
text-align:center;
padding:60px 20px 40px 20px;
}

.logo{
width:340px;
max-width:90%;
margin-bottom:15px;
}

.brand{
font-size:1.6em;
letter-spacing:4px;
margin-bottom:8px;
}

.tagline{
font-style:italic;
color:#ccc;
margin-bottom:25px;
font-size:0.95em;
}

.info{
color:#bbb;
line-height:1.6;
margin-bottom:30px;
font-size:0.9em;
}

/* BOTONES DESLIZABLES */

.menu-nav{
display:flex;
gap:12px;
padding:10px 0 20px 0;
scroll-snap-type:x mandatory;
justify-content:center;
overflow-x:auto;
}

/* En pantallas grandes centramos completamente */
@media (min-width:768px){
.menu-nav{
overflow-x:visible;
justify-content:center;
}
}

.menu-nav::-webkit-scrollbar{
display:none;
}

.menu-nav a{
flex:0 0 auto;
scroll-snap-align:start;
text-decoration:none;
color:white;
padding:12px 20px;
border:1px solid rgba(255,255,255,0.25);
border-radius:30px;
font-size:0.85em;
white-space:nowrap;
transition:0.3s;
}

.menu-nav a:hover{
background:white;
color:#111;
}

/* REDES */

.social{
margin-top:25px;
}

.social img{
width:24px;
margin:0 10px;
filter:invert(1);
opacity:0.85;
transition:0.2s;
}

.social img:hover{
opacity:1;
transform:scale(1.15);
}

/* RESPONSIVE AJUSTES */

@media (max-width:480px){
.logo{
width:280px;
}
.brand{
font-size:1.4em;
}
}

</style>
</head>

<body>

<div class="main">

<img src="LogoPrincipal.png" class="logo">

<div class="brand">AvoHouse Pub</div>

<div class="tagline">
Donde la música no compite con la conversación.
</div>

<div class="info">
Calle 27 No. 26-99<br>
San José del Guaviare<br><br>
Dom–Jue 16:00 – 00:00<br>
Vie–Sáb hasta 01:00
</div>

<a href="cervezas.html">Cervezas</a>
<a href="sinalcohol.html">Sin Alcohol</a>
</div>

</a>
<a href="https://www.instagram.com/avohouseguaviare" target="_blank">

</a>

</div>

</div>

</body>
</html>
