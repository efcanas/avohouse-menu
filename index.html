<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Helvetica Neue', Arial, sans-serif;
color:white;
background:url('Fondo.png') center/cover fixed no-repeat;
}

/* CAPA OSCURA SUAVE */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

/* CONTENEDOR CENTRAL */

.container{
max-width:800px;
margin:80px auto;
background:rgba(20,20,20,0.6);
padding:40px;
border-radius:15px;
backdrop-filter:blur(12px);
text-align:center;
}

.logo{
width:330px;
margin-bottom:15px;
}

.brand{
font-size:1.7em;
letter-spacing:4px;

.tagline{
font-style:italic;
color:#ccc;
margin-bottom:25px;
}

.info{
color:#bbb;
line-height:1.6;
margin-bottom:25px;
}

/* BOTONES */

.menu-nav{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:nowrap;
margin-top:20px;
}

.menu-nav a{
text-decoration:none;
color:white;
padding:12px 20px;
border:1px solid rgba(255,255,255,0.2);
border-radius:30px;
font-size:0.9em;
transition:0.3s;
white-space:nowrap;
}

.menu-nav a:hover{
background:white;
color:#111;
}

.social{
margin-top:25px;
}

.social img{
width:24px;
margin:0 8px;
filter:invert(1);
opacity:0.8;
transition:0.2s;
}

.social img:hover{
opacity:1;
transform:scale(1.15);
}

</style>
</head>
