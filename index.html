<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AvoHouse Pub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Helvetica Neue', Arial, sans-serif;
color:white;
background:url('Fondo.png') center/cover fixed no-repeat;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

/* ===== PORTADA ===== */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero img{
width:320px;
max-width:90%;
margin-bottom:20px;
}

.hero h1{
font-size:2em;
letter-spacing:4px;
margin-bottom:15px;
}

.hero p{
font-size:1.1em;
letter-spacing:2px;
color:#ccc;
margin-bottom:40px;
}

.hero button{
padding:14px 30px;
border:1px solid white;
background:transparent;
color:white;
font-size:0.9em;
letter-spacing:2px;
cursor:pointer;
transition:0.3s;
border-radius:30px;
}

.hero button:hover{
background:white;
color:black;
}

/* ===== MENÚ ===== */

.menu-section{
padding:100px 20px 80px 20px;
text-align:center;
}

.menu-title{
font-size:1.6em;
letter-spacing:4px;
margin-bottom:40px;
}

.menu-buttons{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.menu-buttons a{
text-decoration:none;
color:white;
border:1px solid rgba(255,255,255,0.3);
padding:15px 25px;
border-radius:30px;
font-size:0.9em;
letter-spacing:2px;
transition:0.3s;
}

.menu-buttons a:hover{
background:white;
color:black;
}

/* RESPONSIVE */

@media(max-width:480px){

.hero img{
width:260px;
}

.hero h1{
font-size:1.6em;
}

.hero p{
font-size:1em;
}

}

</style>
</head>

<body>

<!-- PORTADA -->

<section class="hero">
<img src="LogoPrincipal.png">
<h1>AvoHouse Pub</h1>
<p>El plan antes del plan.</p>
<button onclick="document.getElementById('menu').scrollIntoView()">Ver Menú ↓</button>
</section>

<!-- MENÚ -->

<section id="menu" class="menu-section">

<div class="menu-title">MENÚ</div>

<div class="menu-buttons">
<a href="mezcladitas.html">Mezcladitas</a>
<a href="firma.html">Firma de la Casa</a>
<a href="cervezas.html">Cervezas</a>
<a href="sinalcohol.html">Sin Alcohol</a>
</div>

</section>

</body>
</html>
