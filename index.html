<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AvoHouse Pub</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Helvetica Neue', Arial, sans-serif;
color:white;
background:url('Fondo.png') center/cover fixed no-repeat;
}

body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;
}

/* HEADER */

.header{
text-align:center;
padding:40px 20px 20px;
}

.logo{
width:300px;
margin-bottom:10px;
}

.title{
font-size:1.6em;
letter-spacing:4px;
margin-bottom:5px;
}

.tagline{
font-size:0.95em;
opacity:0.8;
margin-bottom:20px;
}

/* INFO */

.info{
font-size:0.9em;
line-height:1.6;
margin-bottom:20px;
}

.info strong{
color:#d4af37;
}

/* REDES */

.socials{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:25px;
}

.socials img{
width:30px;
transition:0.3s;
}

.socials img:hover{
transform:scale(1.15);
}

/* BOTONES SECCIONES */

.menu-sections{
display:flex;
gap:15px;
overflow-x:auto;
justify-content:center;
padding:20px;
scrollbar-width:none;
}

.menu-sections::-webkit-scrollbar{
display:none;
}

.menu-sections a{
flex:0 0 auto;
text-decoration:none;
color:white;
padding:12px 22px;
border:1px solid rgba(255,255,255,0.3);
border-radius:30px;
font-size:0.9em;
transition:0.3s;
white-space:nowrap;
}

.menu-sections a:hover{
background:#d4af37;
color:#111;
border-color:#d4af37;
}

/* SCROLL BUTTON */

#scrollTop{
position:fixed;
bottom:25px;
right:25px;
background:#d4af37;
color:#111;
border:none;
padding:12px 15px;
border-radius:50%;
cursor:pointer;
font-size:16px;
display:none;
transition:0.3s;
}

#scrollTop:hover{
transform:scale(1.1);
}

</style>
</head>

<body>

<div class="header">

<img src="LogoPrincipal.png" class="logo">

<div class="title">AvoHouse Pub</div>

<div class="tagline">
Donde la música no compite con la conversación.
</div>

<div class="info">
<strong>Abierto Dom-Jue 16:00 - 00:00</strong><br>
Viernes y Sábado hasta 01:00<br>
Calle 27 No. 26-99<br>
San José del Guaviare
</div>

<div class="socials">
<a href="https://wa.me/573026475174" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<a href="https://www.instagram.com/avohouseguaviare" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733558.png">
</a>

<a href="https://www.facebook.com/people/Avohouse-Guaviare/" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
</a>

<a href="https://www.google.com/maps/place/AvoHouse/@2.5601682,-72.6302689,18.04z" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
</a>
</div>

</div>

<div class="menu-sections">
<a href="mezcladitas.html">Mezcladitas</a>
<a href="firma.html">Firma de la Casa</a>
<a href="cervezas.html">Cervezas</a>
<a href="sinalcohol.html">Sin Alcohol</a>
</div>

<button id="scrollTop" onclick="scrollToTop()">↑</button>

<script>
window.onscroll = function(){
let btn = document.getElementById("scrollTop");
if(document.body.scrollTop > 200 || document.documentElement.scrollTop > 200){
btn.style.display = "block";
}else{
btn.style.display = "none";
}
};

function scrollToTop(){
window.scrollTo({top:0, behavior:'smooth'});
}
</script>

</body>
</html>
